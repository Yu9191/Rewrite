name: 清理提交历史

# ⚠️ 破坏性操作：会改写 main 历史并强推
# 仅保留符合 Conventional Commits 规范的提交
# 触发方式：仓库 → Actions → 选择此 workflow → Run workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（只输出会保留的提交列表，不实际改写）"
        type: boolean
        default: true
      keep_pattern:
        description: "保留的提交消息正则（默认 conventional commits）"
        default: '^(feat|fix|docs|chore|refactor|perf|test|style|build|ci|revert)(\(.+\))?!?:\s+.+'
      confirm:
        description: "输入 YES 确认强推 main 分支（dry_run=false 时必填）"
        default: ""

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含全部历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 安装 git-filter-repo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git-filter-repo

      - name: 配置 Git 身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 统计原始提交数
        run: |
          echo "::notice::原始提交数: $(git rev-list --count HEAD)"

      - name: 列出会被保留的提交
        env:
          KEEP_PATTERN: ${{ inputs.keep_pattern }}
        run: |
          echo "## 将保留的提交（前 100 条）" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git log --pretty=format:'%h %s' \
            | grep -E "$KEEP_PATTERN" \
            | head -n 100 \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          KEEP_COUNT=$(git log --pretty=format:'%s' | grep -cE "$KEEP_PATTERN" || true)
          DROP_COUNT=$(( $(git rev-list --count HEAD) - KEEP_COUNT ))
          echo "::notice::保留 ${KEEP_COUNT} 条 / 丢弃 ${DROP_COUNT} 条"

      - name: 校验 confirm 参数
        if: ${{ !inputs.dry_run }}
        run: |
          if [ "${{ inputs.confirm }}" != "YES" ]; then
            echo "::error::非 dry-run 必须把 confirm 输入为 'YES'"
            exit 1
          fi

      - name: 执行 filter-repo（drop 不匹配的提交）
        if: ${{ !inputs.dry_run }}
        env:
          KEEP_PATTERN: ${{ inputs.keep_pattern }}
        run: |
          python3 - <<'PY'
          import os, re, subprocess, sys
          pattern = re.compile(os.environ["KEEP_PATTERN"].encode())
          callback = (
              "import re\n"
              "pat = re.compile(rb%r)\n"
              "def commit_callback(c, _):\n"
              "    msg = c.message.splitlines()[0] if c.message else b''\n"
              "    # 保留 merge 提交以及匹配 pattern 的提交\n"
              "    if len(c.parents) > 1 or pat.search(msg):\n"
              "        return\n"
              "    c.skip()\n"
          ) % os.environ["KEEP_PATTERN"]
          # 借助 --commit-callback 直接传 Python 脚本
          subprocess.check_call([
              "git", "filter-repo", "--force",
              "--commit-callback", callback,
          ])
          PY

      - name: 统计清理后提交数
        if: ${{ !inputs.dry_run }}
        run: |
          echo "::notice::清理后提交数: $(git rev-list --count HEAD)"

      - name: 强推 main
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:main
